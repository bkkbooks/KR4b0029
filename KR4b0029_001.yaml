body:
  text: 卷一孝經詩二章立身行道始於事親上下無怨不惡於人孝無終始不離其身三者備矣以臨其民以孝事君不離令名進思盡忠義則不爭匡救其惡災害不生孝悌之至通於神明類聚五十五初學記二十一詩紀二十二論語詩二章守死善道磨而不磷直哉史魚可謂大臣見危授命能致其身克己復禮學優則仕富貴在天為仁由己以道事君死而後已類聚五十五初學記二十一詩紀二十二毛詩詩二章無將大車維塵冥冥濟濟多士文王以寧顯允君子大猷是經聿脩厥德令終有俶勉爾遯思我言維服盜言孔甘其何能淑讒人罔極有靦面目類聚五十五初學記二十一詩紀二十二周易詩卑以自牧謙尊而光進德修業既有典常暉光日新照于四方小人勿用君子道長類聚五十五初學記二十一詩紀二十二周官詩二章惟王建國設官分職進賢興功取諸易直除其不蠲無敢反側以德詔爵允臻其極辨其可任以告于正掌其戒禁治其政令各修乃職以聽王命類聚五十五初學記二十一詩紀二十二左傳詩左傳詩事君之禮敢不盡情敬奉德義樹之風聲昭德塞違不殞其名死而利國以為己榮茲心不爽忠而能力不為利啗古之遺直威黜不端勿使能植初學記二十一詩紀二十二與尚書同僚詩非望之寵謬加于己猥授非據奄司萬里煌煌朱軒服驥驂騄曄曄初星肅肅臣僕暉光顯赫眾目所屬斯之弗稱匪榮伊辱質弱尚父受任鷹揚德非樊仲王命是將百城或違無能有匡一州之矜將弛其綱得意忘言言在意後夫惟神交可以長久我心之孚有盈于缶與子偕老豈曰執手出司萬里牧彼朔濱服冕乘軒六轡既均威風先邁百城肅震類聚三十一廣文選十詩紀二十二贈褚武良詩爰暨于褚惟晉之禎肇振鳳翼羽儀上京聿作喉舌納言紫庭光贊帝道敷皇之明方任之重實在江揚乃授旄鉞宣曜威靈悠悠遐邁東夏于征類聚三十一廣文選十詩紀二十二贈崔伏二郎詩英妙之選二生之授顒顒兩城歡德之茂君子所居九夷非陋無狹百里而不垂覆人之好我贈我清詩示我周行心與道期誠發自中義形於辭古人辭讜豈不爾思類聚三十一廣文選十詩紀二十二答潘尼詩并序司州秀才潘正叔識通才高以文學溫雅為博士余性直而處清論褒貶之任作詩以見規雖褒飾之舉非所敢聞而斐粲之辭良可樂也答之雖不足以相酬報所謂盍各言志也貽我妙文繁春之榮匪榮斯尚乃新其聲吉甫作頌有馥其馨寔由樊仲其德克明授此瓦礫廁彼瑤瓊貺非其喻聞寵若驚類聚三十一廣文選一詩紀二十二答欒弘詩并序安樂令欒弘太傅鉅平侯羊公辟未就而公薨後應司州之命舉秀才博文通濟之士余失和於府當換為護軍司馬賦詩見贈答之云爾鉅平作宰是貴是欽弓旌仍招嘉命胥尋鸞鳳養儀戢翼幽林未附雅調以和韶音鉅平遐逝厲志彌深肅肅京司清風裁邁乃延群彥龍集鳳會亦既斯降萬里有賴聲發響應好結傾蓋類聚三十一詩紀二十二贈建平太守李叔龍贈建平太守李叔龍弘道興化實在良守悠悠建平皇澤未流朝選於眾乃子之授南荊注望心乎克副類聚三十一詩紀二十二又韻補四作傅玄引守流授三韻贈何劭王濟并序朗陵公何敬祖咸之從內兄國子祭酒王武子咸從姑之外孫也竝以明德見重於世咸親之重之情猶同生義則師友何公既登侍中武子俄而亦作二賢相得甚歡咸亦慶之然自限闇劣雖願其繾綣而從之末由歷試無效且有家艱心存目替賦詩申懷以貽之云爾日月光太清列宿曜紫微赫赫大晉朝明明闢皇闈吾兄既鳳翔王子亦龍飛雙鸞遊蘭渚二離揚清暉攜手升玉階竝坐侍丹帷金璫綴惠文煌煌發令姿斯榮非攸庶繾綣情所希豈不企高蹤麟趾邈難追臨川靡芳餌何為守空坻槁葉待風飄逝將與君違違君能無戀尸素當言歸歸身蓬蓽廬樂道以忘饑進則無云補退則恤其私但願隆弘美王度日清夷文選二十五初學記十二詩紀二十二又御覽二百十九引序及飛輝二韻贈太尉司馬虞顯機帝崇元淑妙選其屬命子是佐增袞之縟類聚三十一詩紀二十二失題一奕奕恆山作鎮冀方伊趙建國在岳之陽失題二零露濬江海飛塵崇山岳過謬佐台輔安能任鼎餗初學記二詩紀二十二愁霖詩舉足沒泥濘市道無行車蘭桂賤朽腐柴粟貴明珠御覽十一詩紀二十二
